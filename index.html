<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใจอักษร — อ่านนิยาย ตอนต่อตอน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Serif+Thai:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night-1:#181026;
    --night-2:#241834;
    --night-3:#2f2044;
    --panel:#2a1d3d;
    --seal:#b5495b;
    --seal-dim:#7d3646;
    --gold:#d4a857;
    --gold-soft:#e6c88a;
    --cream:#f3e9da;
    --lavender:#a896c7;
    --lavender-dim:#5f5279;
    --paper:#fbf5ea;
    --paper-line:#e6dac4;
    --ink:#2b2118;
    --ink-soft:#6b5c47;
    --radius:14px;
    --serif: 'Noto Serif Thai', 'Playfair Display', serif;
    --display: 'Playfair Display', 'Noto Serif Thai', serif;
    --ui: 'Noto Sans Thai', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--night-1);
    color:var(--cream);
    font-family:var(--ui);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}
  a{color:inherit; text-decoration:none;}
  button{font-family:var(--ui); cursor:pointer; border:none; background:none; color:inherit;}
  ::selection{background:var(--gold); color:var(--night-1);}

  /* ---------- Nav ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 32px;
    background:rgba(24,16,38,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(212,168,87,0.16);
  }
  .brand{display:flex; align-items:center; gap:10px; font-family:var(--display); font-size:22px; letter-spacing:0.02em; font-weight:600;}
  .brand .mark{width:26px;height:26px; flex-shrink:0;}
  .navlinks{display:flex; align-items:center; gap:28px; font-size:14.5px;}
  .navlinks button{opacity:0.82; transition:opacity .2s, color .2s;}
  .navlinks button:hover{opacity:1; color:var(--gold-soft);}
  .navlinks button.active{opacity:1; color:var(--gold);}
  .nav-right{display:flex; align-items:center; gap:14px;}
  .coin-pill{
    display:flex; align-items:center; gap:6px;
    background:rgba(212,168,87,0.12); border:1px solid rgba(212,168,87,0.3);
    padding:6px 12px; border-radius:999px; font-size:13.5px; color:var(--gold-soft);
  }
  .btn{
    padding:9px 18px; border-radius:999px; font-size:14px; font-weight:600;
    transition:transform .15s, box-shadow .15s, background .15s;
  }
  .btn-gold{background:linear-gradient(135deg, var(--gold-soft), var(--gold)); color:var(--night-1);}
  .btn-gold:hover{transform:translateY(-1px); box-shadow:0 6px 18px rgba(212,168,87,0.35);}
  .btn-ghost{border:1px solid rgba(243,233,218,0.28); color:var(--cream);}
  .btn-ghost:hover{border-color:var(--gold); color:var(--gold-soft);}
  .btn-seal{background:var(--seal); color:var(--paper);}
  .btn-seal:hover{background:#c8556a;}
  .avatar-btn{
    width:36px; height:36px; border-radius:50%; background:var(--night-3);
    border:1px solid rgba(212,168,87,0.35); display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-weight:600; color:var(--gold-soft); font-size:15px;
  }

  main{flex:1;}
  .container{max-width:1180px; margin:0 auto; padding:0 32px;}

  /* ---------- Hero (Home) ---------- */
  .hero{
    position:relative; overflow:hidden;
    padding:88px 32px 96px;
    background:
      radial-gradient(ellipse 60% 50% at 15% 10%, rgba(181,73,91,0.28), transparent 60%),
      radial-gradient(ellipse 50% 60% at 85% 30%, rgba(212,168,87,0.14), transparent 60%),
      linear-gradient(180deg, var(--night-1), var(--night-2) 60%, var(--night-1));
  }
  .stars{position:absolute; inset:0; pointer-events:none; opacity:0.7;}
  .hero-inner{position:relative; max-width:1180px; margin:0 auto; display:grid; grid-template-columns:1.1fr 0.9fr; gap:56px; align-items:center;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; font-size:12.5px; letter-spacing:0.14em;
    color:var(--gold-soft); text-transform:uppercase; margin-bottom:18px;
  }
  .eyebrow::before{content:''; width:20px; height:1px; background:var(--gold); display:inline-block;}
  .hero h1{
    font-family:var(--serif); font-weight:700; font-size:44px; line-height:1.32;
    color:var(--cream); margin-bottom:20px;
  }
  .hero h1 em{font-style:normal; color:var(--gold-soft);}
  .hero p{font-size:16px; line-height:1.8; color:var(--lavender); max-width:480px; margin-bottom:30px;}
  .hero-actions{display:flex; gap:14px;}
  .hero-actions .btn{padding:13px 26px; font-size:15px;}

  /* Constellation visual — signature element */
  .constellation{position:relative; height:380px;}
  .const-line{position:absolute; inset:0;}
  .const-node{
    position:absolute; display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .const-dot{
    width:14px; height:14px; border-radius:50%; background:var(--gold-soft);
    box-shadow:0 0 0 4px rgba(212,168,87,0.15), 0 0 18px rgba(212,168,87,0.55);
  }
  .const-dot.locked{background:var(--seal); box-shadow:0 0 0 4px rgba(181,73,91,0.15), 0 0 14px rgba(181,73,91,0.5);}
  .const-label{font-size:11px; color:var(--lavender); white-space:nowrap;}
  .const-card{
    position:absolute; right:0; bottom:6px; width:230px;
    background:var(--panel); border:1px solid rgba(212,168,87,0.25); border-radius:var(--radius);
    padding:16px; box-shadow:0 20px 50px rgba(0,0,0,0.4);
  }
  .const-card .t{font-family:var(--serif); font-weight:600; font-size:15px; margin-bottom:4px;}
  .const-card .a{font-size:12px; color:var(--lavender); margin-bottom:10px;}
  .const-card .bar{height:5px; border-radius:99px; background:rgba(243,233,218,0.12); overflow:hidden;}
  .const-card .bar span{display:block; height:100%; width:42%; background:linear-gradient(90deg,var(--gold),var(--gold-soft));}
  .const-card .pct{font-size:11px; color:var(--gold-soft); margin-top:6px;}

  /* ---------- Section headers ---------- */
  .section{padding:64px 32px;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:28px;}
  .section-head h2{font-family:var(--serif); font-size:26px; font-weight:700; color:var(--cream);}
  .section-head .sub{font-size:13px; color:var(--lavender);}
  .see-all{font-size:13px; color:var(--gold-soft); border-bottom:1px solid transparent;}
  .see-all:hover{border-color:var(--gold-soft);}

  /* ---------- Novel grid / cards ---------- */
  .grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:22px;}
  .card{
    background:var(--panel); border:1px solid rgba(212,168,87,0.14); border-radius:var(--radius);
    overflow:hidden; cursor:pointer; transition:transform .2s, border-color .2s, box-shadow .2s;
    display:flex; flex-direction:column;
  }
  .card:hover{transform:translateY(-4px); border-color:rgba(212,168,87,0.4); box-shadow:0 16px 34px rgba(0,0,0,0.35);}
  .cover{
    height:220px; position:relative; display:flex; align-items:flex-end; padding:14px;
    background-size:cover; background-position:center;
  }
  .cover::after{content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(24,16,38,0) 40%, rgba(24,16,38,0.85));}
  .cover .badge{position:relative; z-index:1; font-size:11px; padding:4px 9px; border-radius:999px; font-weight:600;}
  .badge-free{background:rgba(212,168,87,0.9); color:var(--night-1);}
  .badge-hot{background:rgba(181,73,91,0.92); color:var(--paper);}
  .card-body{padding:14px 16px 18px;}
  .card-body h3{font-family:var(--serif); font-size:15.5px; font-weight:600; line-height:1.4; margin-bottom:5px; color:var(--cream);}
  .card-body .author{font-size:12px; color:var(--lavender); margin-bottom:9px;}
  .card-meta{display:flex; align-items:center; gap:12px; font-size:11.5px; color:var(--lavender-dim);}
  .card-meta span{display:flex; align-items:center; gap:4px;}

  /* ---------- Novel detail ---------- */
  .novel-hero{
    display:grid; grid-template-columns:260px 1fr; gap:40px; padding:52px 32px 40px; max-width:1180px; margin:0 auto;
  }
  .novel-cover{
    width:260px; height:360px; border-radius:12px; background-size:cover; background-position:center;
    box-shadow:0 24px 60px rgba(0,0,0,0.5); border:1px solid rgba(212,168,87,0.2);
  }
  .novel-info .genre-tag{
    display:inline-block; font-size:11.5px; padding:4px 11px; border-radius:999px;
    border:1px solid rgba(212,168,87,0.4); color:var(--gold-soft); margin-bottom:14px;
  }
  .novel-info h1{font-family:var(--serif); font-size:32px; font-weight:700; margin-bottom:8px; line-height:1.3;}
  .novel-info .author{font-size:14px; color:var(--lavender); margin-bottom:18px;}
  .novel-info .synopsis{font-size:14.5px; line-height:1.9; color:#d9cfe8; max-width:640px; margin-bottom:22px;}
  .stat-row{display:flex; gap:26px; margin-bottom:26px;}
  .stat-row div{display:flex; flex-direction:column; gap:2px;}
  .stat-row .num{font-family:var(--serif); font-size:19px; font-weight:700; color:var(--gold-soft);}
  .stat-row .lbl{font-size:11.5px; color:var(--lavender-dim);}
  .novel-actions{display:flex; gap:12px;}

  /* Chapter "strand" — signature element on novel page */
  .strand-wrap{max-width:1180px; margin:0 auto; padding:10px 32px 80px;}
  .strand-wrap h2{font-family:var(--serif); font-size:22px; margin-bottom:26px;}
  .strand{position:relative; padding-left:36px;}
  .strand::before{content:''; position:absolute; left:11px; top:6px; bottom:6px; width:2px; background:linear-gradient(180deg, var(--gold), var(--seal-dim));}
  .chap{
    position:relative; display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; margin-bottom:8px; border-radius:10px; cursor:pointer;
    transition:background .15s;
  }
  .chap:hover{background:rgba(212,168,87,0.06);}
  .chap::before{
    content:''; position:absolute; left:-30px; width:12px; height:12px; border-radius:50%;
    background:var(--gold-soft); box-shadow:0 0 0 4px var(--night-1), 0 0 0 5px rgba(212,168,87,0.3);
  }
  .chap.locked::before{background:var(--seal);}
  .chap.owned::before{background:var(--gold-soft); box-shadow:0 0 0 4px var(--night-1), 0 0 0 5px rgba(212,168,87,0.3);}
  .chap-title{display:flex; align-items:center; gap:12px; font-size:14.5px;}
  .chap-num{color:var(--lavender-dim); font-size:12.5px; min-width:44px;}
  .chap-right{display:flex; align-items:center; gap:10px; font-size:12.5px;}
  .price-tag{display:flex; align-items:center; gap:4px; color:var(--gold-soft);}
  .free-tag{color:var(--lavender);}
  .lock-icon, .check-icon{width:15px; height:15px; opacity:0.8;}

  /* ---------- Reader ---------- */
  .reader-shell{background:var(--paper); color:var(--ink); min-height:100vh;}
  .reader-top{
    position:sticky; top:0; z-index:30; background:rgba(251,245,234,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--paper-line);
    display:flex; align-items:center; justify-content:space-between; padding:14px 32px;
  }
  .reader-top .back{font-size:13.5px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;}
  .reader-top .ttl{font-family:var(--serif); font-size:14px; font-weight:600; text-align:center;}
  .font-ctrl{display:flex; align-items:center; gap:10px;}
  .font-ctrl button{width:30px; height:30px; border-radius:50%; border:1px solid var(--paper-line); font-size:14px;}
  .font-ctrl button:hover{border-color:var(--ink-soft);}
  .reader-body{max-width:680px; margin:0 auto; padding:56px 24px 100px;}
  .reader-body .chap-eyebrow{font-size:12.5px; color:var(--ink-soft); letter-spacing:0.08em; margin-bottom:10px;}
  .reader-body h1{font-family:var(--serif); font-size:26px; margin-bottom:34px; line-height:1.4;}
  .reader-text{font-family:var(--serif); font-size:18px; line-height:2.05; color:#3a2f22;}
  .reader-text p{margin-bottom:22px;}
  .reader-nav{
    max-width:680px; margin:0 auto; display:flex; justify-content:space-between; padding:20px 24px 60px; gap:16px;
  }
  .reader-nav button{
    flex:1; padding:14px; border-radius:10px; border:1px solid var(--paper-line); font-size:13.5px; text-align:left;
  }
  .reader-nav button:hover{border-color:var(--seal); background:rgba(181,73,91,0.04);}
  .reader-nav button:disabled{opacity:0.35; cursor:default;}
  .reader-nav .lbl{display:block; font-size:11px; color:var(--ink-soft); margin-bottom:3px;}

  /* Paywall */
  .paywall{
    max-width:440px; margin:80px auto; text-align:center; background:var(--night-2); color:var(--cream);
    border-radius:18px; padding:44px 36px; border:1px solid rgba(212,168,87,0.25);
  }
  .paywall .seal{
    width:54px; height:54px; border-radius:50%; background:var(--seal); margin:0 auto 20px;
    display:flex; align-items:center; justify-content:center;
  }
  .paywall h2{font-family:var(--serif); font-size:20px; margin-bottom:10px;}
  .paywall p{font-size:13.5px; color:var(--lavender); line-height:1.7; margin-bottom:26px;}
  .paywall .price-big{font-family:var(--serif); font-size:28px; color:var(--gold-soft); margin-bottom:22px;}
  .paywall .price-big span{font-size:14px; color:var(--lavender);}

  /* ---------- Auth ---------- */
  .auth-wrap{min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center; padding:60px 24px;
    background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(181,73,91,0.18), transparent 60%), var(--night-1);}
  .auth-card{width:380px; background:var(--panel); border:1px solid rgba(212,168,87,0.2); border-radius:18px; padding:40px 34px;}
  .auth-card h1{font-family:var(--serif); font-size:24px; margin-bottom:6px; text-align:center;}
  .auth-card .sub{font-size:13px; color:var(--lavender); text-align:center; margin-bottom:28px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; color:var(--lavender); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; border-radius:9px; background:rgba(255,255,255,0.04);
    border:1px solid rgba(243,233,218,0.18); color:var(--cream); font-size:14px; font-family:var(--ui);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--gold);}
  .field textarea{resize:vertical; min-height:90px;}
  .auth-card .btn{width:100%; padding:12px; margin-top:8px; font-size:14.5px;}
  .auth-switch{text-align:center; font-size:13px; color:var(--lavender); margin-top:20px;}
  .auth-switch button{color:var(--gold-soft); font-weight:600;}

  /* ---------- Upload / writer dashboard ---------- */
  .dash{max-width:1180px; margin:0 auto; padding:44px 32px 90px; display:grid; grid-template-columns:320px 1fr; gap:36px;}
  .dash-panel{background:var(--panel); border:1px solid rgba(212,168,87,0.16); border-radius:var(--radius); padding:26px;}
  .dash-panel h2{font-family:var(--serif); font-size:18px; margin-bottom:18px;}
  .toggle-row{display:flex; gap:8px; margin-bottom:16px;}
  .toggle-row button{flex:1; padding:9px; border-radius:8px; border:1px solid rgba(243,233,218,0.18); font-size:13px;}
  .toggle-row button.active{background:rgba(212,168,87,0.16); border-color:var(--gold); color:var(--gold-soft);}
  .price-row{display:flex; gap:10px; align-items:center;}
  .price-row input{flex:1;}
  .my-novel-list{display:flex; flex-direction:column; gap:14px;}
  .my-novel{
    display:flex; gap:14px; padding:14px; border:1px solid rgba(212,168,87,0.14); border-radius:12px; align-items:center;
  }
  .my-novel img, .my-novel .cimg{width:52px; height:70px; border-radius:6px; background-size:cover; background-position:center; flex-shrink:0;}
  .my-novel .info{flex:1;}
  .my-novel .info h4{font-family:var(--serif); font-size:14.5px; margin-bottom:3px;}
  .my-novel .info p{font-size:11.5px; color:var(--lavender);}
  .my-novel .actions{display:flex; gap:8px;}
  .icon-btn{width:32px; height:32px; border-radius:8px; border:1px solid rgba(243,233,218,0.18); display:flex; align-items:center; justify-content:center;}
  .icon-btn:hover{border-color:var(--gold);}
  .chapter-mini-list{display:flex; flex-direction:column; gap:6px; margin-top:10px; padding-top:10px; border-top:1px dashed rgba(243,233,218,0.15);}
  .chapter-mini{display:flex; justify-content:space-between; font-size:12px; color:var(--lavender); padding:4px 0;}

  /* ---------- Profile ---------- */
  .profile-head{
    display:flex; align-items:center; gap:20px; padding:52px 32px 30px; max-width:1180px; margin:0 auto;
  }
  .profile-avatar{width:72px; height:72px; border-radius:50%; background:var(--night-3); border:1px solid rgba(212,168,87,0.35);
    display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:26px; color:var(--gold-soft);}
  .profile-head h1{font-family:var(--serif); font-size:24px;}
  .profile-head .sub{font-size:13px; color:var(--lavender); margin-top:4px;}
  .wallet-card{
    max-width:1180px; margin:0 auto 40px; padding:0 32px;
  }
  .wallet-inner{
    background:linear-gradient(120deg, var(--night-3), var(--panel)); border:1px solid rgba(212,168,87,0.25);
    border-radius:16px; padding:24px 28px; display:flex; align-items:center; justify-content:space-between;
  }
  .wallet-inner .coins{font-family:var(--serif); font-size:30px; color:var(--gold-soft);}
  .wallet-inner .coins span{font-size:14px; color:var(--lavender); margin-left:8px;}
  .topup-row{display:flex; gap:10px;}
  .topup-row button{padding:9px 16px; border-radius:9px; border:1px solid rgba(212,168,87,0.3); font-size:13px;}
  .topup-row button:hover{background:rgba(212,168,87,0.12);}
  .profile-body{max-width:1180px; margin:0 auto; padding:0 32px 90px; display:grid; grid-template-columns:1fr 1fr; gap:32px;}
  .plist{display:flex; flex-direction:column; gap:12px;}
  .plist-item{display:flex; gap:12px; align-items:center; padding:10px; border-radius:10px; border:1px solid rgba(212,168,87,0.12);}
  .plist-item .cimg{width:42px; height:58px; border-radius:5px; background-size:cover; background-position:center; flex-shrink:0;}
  .plist-item .t{font-size:13.5px; font-family:var(--serif);}
  .plist-item .m{font-size:11px; color:var(--lavender);}

  .empty{padding:30px; text-align:center; color:var(--lavender-dim); font-size:13px; border:1px dashed rgba(243,233,218,0.18); border-radius:12px;}

  footer{padding:30px 32px; text-align:center; font-size:12px; color:var(--lavender-dim); border-top:1px solid rgba(212,168,87,0.1);}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--night-3); border:1px solid var(--gold); color:var(--cream); padding:12px 22px; border-radius:999px;
    font-size:13.5px; z-index:100; transition:all .25s; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width: 880px){
    .hero-inner{grid-template-columns:1fr;}
    .constellation{display:none;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .novel-hero{grid-template-columns:1fr; padding-top:36px;}
    .novel-cover{width:180px; height:250px;}
    .dash{grid-template-columns:1fr;}
    .profile-body{grid-template-columns:1fr;}
    .navlinks{display:none;}
    .topbar{padding:14px 18px;}
    .section, .container{padding-left:18px; padding-right:18px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ MOCK DATA ============ */
const GENRES = ["โรแมนซ์แฟนตาซี","โรแมนซ์ดราม่า","สลับร่าง/รักต่างมิติ","โรแมนซ์คอมเมดี้"];

function makeChapters(n, freeCount, price, seedTitle){
  const arr = [];
  for(let i=1;i<=n;i++){
    arr.push({
      id: i,
      title: `ตอนที่ ${i}`,
      free: i <= freeCount,
      price: i <= freeCount ? 0 : price,
      words: 1800 + (i*37)%900,
      content: [

function toast(msg){
  let t = document.querySelector('.toast');
  if(!t){ t=document.createElement('div'); t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function fmt(n){ return n>=1000? (n/1000).toFixed(1).replace('.0','')+'k' : n; }

function ensureUser(){
  if(!state.user){
    navigate('auth');
    return false;

  return true;
}

function navigate(view, params={}){
  state.view = view;
  Object.assign(state, params);
  window.scrollTo(0,0);
  render();
}

function stars(){

/* ============ READER ============ */
function renderReader(){
  const n = novels.find(x=>x.id===state.novelId);
  if(!n) return renderHome();
  const c = n.chapters.find(x=>x.id===state.chapterId) || n.chapters[0];
  const owned = state.user && state.user.purchased.includes(n.id+'-'+c.id);
  const locked = !c.free && !owned;
  const idx = n.chapters.findIndex(x=>x.id===c.id);
  const prev = n.chapters[idx-1], next = n.chapters[idx+1];

  const body = locked ? `
    <div class="paywall">
      <div class="seal">${ic.seal}</div>
      <h2>ตอนนี้ต้องปลดล็อกก่อนอ่าน</h2>
      <p>${n.title} — ${c.title}<br>สนับสนุนนักเขียนด้วยเหรียญเพื่ออ่านตอนนี้แบบเต็ม ๆ</p>
      <div class="price-big">${c.price} <span>เหรียญ</span></div>
      <button class="btn btn-seal" style="width:100%; padding:13px;" data-action="unlock" data-id="${n.id}" data-chap="${c.id}">ปลดล็อกตอนนี้</button>
      <div style="margin-top:12px;"><button class="btn btn-ghost" style="width:100%; padding:11px;" data-nav="novel" data-id="${n.id}">ย้อนกลับไปหน้ารายละเอียด</button></div>
    </div>
  ` : `
    <div class="reader-body">
      <div class="chap-eyebrow">${n.title}</div>
      <h1>${c.title}</h1>
      <div class="reader-text" style="font-size:${state.fontSize}px">
        ${c.content.map(p=>`<p>${p}</p>`).join('')}
      </div>
    </div>
    <div class="reader-nav">
      <button ${!prev?'disabled':''} data-nav="reader" data-id="${n.id}" data-chap="${prev?prev.id:''}">
        <span class="lbl">← ตอนก่อนหน้า</span>${prev?prev.title:'—'}
      </button>
      <button ${!next?'disabled':''} data-nav="reader" data-id="${n.id}" data-chap="${next?next.id:''}">
        <span class="lbl">ตอนถัดไป →</span>${next?next.title:'—'}
      </button>
    </div>
  `;

  return `
  <div class="reader-shell">
    <div class="reader-top">
      <button class="back" data-nav="novel" data-id="${n.id}">← ${n.title}</button>
      <div class="ttl">${c.title}</div>
      <div class="font-ctrl">
        <button data-action="font-" >A−</button>
        <button data-action="font+">A+</button>
      </div>
    </div>
    ${body}
  </div>
  `;
}

  ${renderTopbar()}
  <div class="dash">
    <div>
      <div class="dash-panel" style="margin-bottom:24px;">
        <h2>สร้างนิยายเรื่องใหม่</h2>
        <form id="new-novel-form">
          <div class="field"><label>ชื่อเรื่อง</label><input type="text" name="title" placeholder="ชื่อนิยายของคุณ" required></div>
          <div class="field"><label>แนวเรื่อง</label>
            <select name="genre">${GENRES.map(g=>`<option>${g}</option>`).join('')}</select>
          </div>
          <div class="field"><label>เรื่องย่อ</label><textarea name="synopsis" placeholder="เกริ่นเรื่องราวสัก 2-3 ประโยค" required></textarea></div>
          <button class="btn btn-gold" style="width:100%; padding:12px;" type="submit">+ สร้างนิยายเรื่องนี้</button>
        </form>
      </div>

      ${editing?`
      <div class="dash-panel">
        <h2>เพิ่มตอนใหม่ — ${editing.title}</h2>
        <form id="new-chapter-form">
          <div class="field"><label>ชื่อตอน</label><input type="text" name="title" placeholder="เช่น ตอนที่ ${editing.chapters.length+1}: ..." required></div>
          <div class="field"><label>เนื้อหาตอน</label><textarea name="content" placeholder="เขียนเนื้อหาตอนนี้..." required></textarea></div>
          <div class="field">
            <label>สถานะการอ่าน</label>
            <div class="toggle-row">
              <button type="button" class="${state.newChapterFree?'active':''}" data-action="chapfree" data-val="1">อ่านฟรี</button>
              <button type="button" class="${!state.newChapterFree?'active':''}" data-action="chapfree" data-val="0">เสียเหรียญ</button>
            </div>
          </div>
          ${!state.newChapterFree?`
          <div class="field"><label>ราคา (เหรียญ)</label>
            <div class="price-row">${ic.coin}<input type="number" min="1" name="price" value="${state.newChapterPrice}"></div>
          </div>`:''}
          <button class="btn btn-gold" style="width:100%; padding:12px; margin-top:6px;" type="submit">+ เพิ่มตอนนี้</button>
        </form>
      </div>`:''}
    </div>

    <div class="dash-panel">
      <h2>นิยายของฉัน (${mine.length})</h2>
      ${mine.length===0?`<div class="empty">ยังไม่มีนิยายที่คุณสร้าง — เริ่มสร้างเรื่องแรกทางซ้ายได้เลย</div>`:`
      <div class="my-novel-list">
        ${mine.map(n=>`
          <div class="my-novel">
            <div class="cimg" style="background:${n.cover}"></div>
            <div class="info">
              <h4>${n.title}</h4>
              <p>${n.chapters.length} ตอน · ${ic.eye} ${fmt(n.views)} ยอดอ่าน</p>
              <div class="chapter-mini-list">
                ${n.chapters.slice(-3).map(c=>`
                  <div class="chapter-mini"><span>${c.title}</span><span>${c.free?'ฟรี':c.price+' เหรียญ'}</span></div>
                `).join('')}
                ${n.chapters.length>3?`<div class="chapter-mini" style="opacity:0.6;">...และอีก ${n.chapters.length-3} ตอน</div>`:''}
              </div>
            </div>
            <div class="actions">
              <button class="icon-btn" title="เพิ่ม/แก้ไขตอน" data-action="edit-novel" data-id="${n.id}">${ic.edit}</button>
              <button class="icon-btn" title="ลบนิยาย" data-action="delete-novel" data-id="${n.id}">${ic.trash}</button>
            </div>
          </div>
        `).join('')}
      </div>`}
    </div>
  </div>
  <footer>ใจอักษร — ต้นแบบเว็บไซต์เพื่อสาธิตการใช้งานเท่านั้น</footer>
  `;
}

/* ============ PROFILE ============ */
function renderProfile(){
  if(!ensureUser()) return '';
  const u = state.user;
  const following = novels.filter(n=>u.following.includes(n.id));
  const purchases = u.purchased.map(key=>{
    const [nid, cid] = key.split('-').map(Number);
    const n = novels.find(x=>x.id===nid);
    const c = n && n.chapters.find(x=>x.id===cid);
    return n && c ? {n,c} : null;
  }).filter(Boolean);

  return `
  ${renderTopbar()}
  <div class="profile-head">
    <div class="profile-avatar">${u.name.charAt(0)}</div>
    <div>
      <h1>${u.name}</h1>
      <div class="sub">สมาชิกใจอักษร</div>
    </div>
  </div>
  <div class="wallet-card">
    <div class="wallet-inner">
      <div>
        <div class="coins">${u.coins} <span>เหรียญคงเหลือ</span></div>
      </div>
      <div class="topup-row">
        <button data-action="topup" data-val="20">+20</button>
        <button data-action="topup" data-val="50">+50</button>
        <button data-action="topup" data-val="100">+100</button>
      </div>
    </div>
  </div>
  <div class="profile-body">
    <div>
      <h2 style="font-family:var(--serif); font-size:18px; margin-bottom:14px;">เรื่องที่ติดตาม (${following.length})</h2>
      <div class="plist">
        ${following.length===0?`<div class="empty">ยังไม่ได้ติดตามนิยายเรื่องใด</div>`:following.map(n=>`
          <div class="plist-item" data-nav="novel" data-id="${n.id}" style="cursor:pointer">
            <div class="cimg" style="background:${n.cover}"></div>
            <div><div class="t">${n.title}</div><div class="m">โดย ${n.author}</div></div>
          </div>
        `).join('')}
      </div>
    </div>
    <div>
      <h2 style="font-family:var(--serif); font-size:18px; margin-bottom:14px;">ประวัติการซื้อ (${purchases.length})</h2>
      <div class="plist">
        ${purchases.length===0?`<div class="empty">ยังไม่มีประวัติการปลดล็อกตอน</div>`:purchases.map(({n,c})=>`
          <div class="plist-item" data-nav="reader" data-id="${n.id}" data-chap="${c.id}" style="cursor:pointer">
            <div class="cimg" style="background:${n.cover}"></div>
            <div><div class="t">${n.title} · ${c.title}</div><div class="m">${c.price} เหรียญ</div></div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>
  <footer>ใจอักษร — ต้นแบบเว็บไซต์เพื่อสาธิตการใช้งานเท่านั้น</footer>
  `;
}

/* ============ RENDER DISPATCH ============ */
function render(){
  const app = document.getElementById('app');
  let html = '';
  switch(state.view){
    case 'home': html = renderHome(); break;
    case 'novel': html = renderNovel(); break;
    case 'reader': html = renderReader(); break;
    case 'auth': html = renderAuth(); break;
    case 'upload': html = renderUpload(); break;
    case 'profile': html = renderProfile(); break;
    default: html = renderHome();
  }
  app.innerHTML = html;
  bindEvents();
}

/* ============ EVENTS ============ */
function bindEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      const view = el.getAttribute('data-nav');
      const params = {};
      if(el.dataset.id) params.novelId = parseInt(el.dataset.id);
      if(el.dataset.chap) params.chapterId = parseInt(el.dataset.chap);
      if(el.dataset.authmode) params.authMode = el.dataset.authmode;
      if(view==='upload') params.editingNovelId = state.editingNovelId;
      navigate(view, params);
    });
  });

  document.querySelectorAll('[data-action="follow"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!ensureUser()) return;
      const id = parseInt(el.dataset.id);
      const u = state.user;
      if(u.following.includes(id)) u.following = u.following.filter(x=>x!==id);
      else { u.following.push(id); toast('ติดตามนิยายเรื่องนี้แล้ว'); }
      render();
    });
  });

  document.querySelectorAll('[data-action="unlock"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!ensureUser()) return;
      const nid = parseInt(el.dataset.id), cid = parseInt(el.dataset.chap);
      const n = novels.find(x=>x.id===nid);
      const c = n.chapters.find(x=>x.id===cid);
      const u = state.user;
      if(u.coins < c.price){ toast('เหรียญไม่พอ — เติมเหรียญที่หน้าโปรไฟล์'); return; }
      u.coins -= c.price;
      u.purchased.push(nid+'-'+cid);
      toast(`ปลดล็อก "${c.title}" สำเร็จ`);
      render();
    });
  });

  document.querySelectorAll('[data-action="font-"], [data-action="font+"]').forEach(el=>{});
  document.querySelectorAll('[data-action="font-"]').forEach(el=>el.addEventListener('click',()=>{state.fontSize=Math.max(14,state.fontSize-1); render();}));
  document.querySelectorAll('[data-action="font+"]').forEach(el=>el.addEventListener('click',()=>{state.fontSize=Math.min(24,state.fontSize+1); render();}));

  document.querySelectorAll('[data-action="topup"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.user.coins += parseInt(el.dataset.val);
      toast(`เติม ${el.dataset.val} เหรียญสำเร็จ`);
      render();
    });
  });

  document.querySelectorAll('[data-action="edit-novel"]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.editingNovelId = parseInt(el.dataset.id); render(); });
  });

  document.querySelectorAll('[data-action="delete-novel"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = parseInt(el.dataset.id);
      if(confirm('ลบนิยายเรื่องนี้? การกระทำนี้ย้อนกลับไม่ได้')){
        novels = novels.filter(n=>n.id!==id);
        if(state.editingNovelId===id) state.editingNovelId=null;
        toast('ลบนิยายแล้ว');
        render();
      }
    });
  });

  document.querySelectorAll('[data-action="chapfree"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.newChapterFree = el.dataset.val==='1';
      render();
    });
  });

  const authForm = document.getElementById('auth-form');
  if(authForm){
    authForm.addEventListener('submit', (e)=>{
      e.preventDefault();
      const fd = new FormData(authForm);
      const name = fd.get('name') || (fd.get('email')||'').toString().split('@')[0] || 'นักอ่าน';
      state.user = {
        name, coins: 20, following: [], purchased: [], myNovelIds: []
      };
      toast(`ยินดีต้อนรับ ${name}`);
      navigate('home');
    });
  }

  const newNovelForm = document.getElementById('new-novel-form');
  if(newNovelForm){
    newNovelForm.addEventListener('submit', (e)=>{
      e.preventDefault();
      const fd = new FormData(newNovelForm);
      const palette = ["#3a2a55,#1c1330","#4a2438,#1c1330","#2a3a4a,#16202c","#4a3a1e,#1c1330","#213a2e,#141f1a"];
      const p = palette[Math.floor(Math.random()*palette.length)].split(',');
      const id = Math.max(0,...novels.map(n=>n.id))+1;
      const newNovel = {
        id, title: fd.get('title'), author: state.user.name, genre: fd.get('genre'),
        cover: `linear-gradient(160deg, ${p[0]}, ${p[1]} 70%)`,
        synopsis: fd.get('synopsis'), hot:false, views:0, likes:0, follows:0, chapters:[]
      };
      novels.unshift(newNovel);
      state.user.myNovelIds.push(id);
      state.editingNovelId = id;
      toast('สร้างนิยายเรื่องใหม่แล้ว — เพิ่มตอนแรกได้เลย');
      render();
    });
  }

  const newChapForm = document.getElementById('new-chapter-form');
  if(newChapForm){
    newChapForm.addEventListener('submit', (e)=>{
      e.preventDefault();
      const fd = new FormData(newChapForm);
      const n = novels.find(x=>x.id===state.editingNovelId);
      const id = n.chapters.length? Math.max(...n.chapters.map(c=>c.id))+1 : 1;
      n.chapters.push({
        id, title: fd.get('title'),
        free: state.newChapterFree,
        price: state.newChapterFree? 0 : parseInt(fd.get('price')||5),
        words: (fd.get('content')||'').length,
        content: (fd.get('content')||'').split('\n').filter(Boolean)
      });
      toast(`เพิ่ม "${fd.get('title')}" แล้ว`);
      render();
    });
  }
}

render();
</script>
</body>
</html>
